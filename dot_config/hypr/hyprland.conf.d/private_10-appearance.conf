general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 5
    gaps_out = 20
    border_size = 1
    col.active_border = rgba($midnightAlphaee) rgba($witchfireAlphaee) 45deg
    col.inactive_border = rgba($cryptAlphaaa)
    col.nogroup_border_active = rgba($nightshadeAlphaee)
    col.nogroup_border = rgba($darkabyssAlphaaa)
    layout = dwindle
    resize_on_border = true
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

group {
    col.border_active = rgba($bloodmoonAlphaee) rgba($shadowveilAlphaee) 45deg
    col.border_inactive = rgba($cryptAlphaaa)
    col.border_locked_active = rgba($crimsonAlphaee) rgba($emberAlphaee) 45deg
    col.border_locked_inactive = rgba($darkabyssAlphaaa)

groupbar {
        font_size = 12
        text_color = rgba($veilshadeAlphaee)
        height = 16
        col.active = rgba($shadowveilAlphaee)
        col.inactive = rgba($cryptAlphaee)
        col.locked_active = rgba($crimsonAlphaee)
        col.locked_inactive = rgba($cryptAlphaee)
    }
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 10
    dim_inactive = true
    dim_strength = 0.4
    dim_special = 0.3

    blur {
        enabled = true
        ignore_opacity = true
        size = 3
        passes = 3
        special = true
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba($bloodmoonlightAlphaee)
        color_inactive = rgba($cryptAlphaee)
    }
}

animations {
    enabled = true
    # source: https://github.com/JaKooLit/Hyprland-Dots/blob/main/config/hypr/UserConfigs/UserDecorAnimations.conf
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    bezier = smoothIn, 0.5, -0.5, 0.68, 1.5
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 5, winIn, slide
    animation = windowsOut, 1, 3, smoothOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 180, liner, loop 
    animation = fade, 1, 3, smoothOut
    animation = workspaces, 1, 5, overshot
    animation = workspacesIn, 1, 5, winIn, slide
    animation = workspacesOut, 1, 5, winOut, slide
}
