[ca/desrt/dconf-editor]
bookmarks=['/org/gnome/desktop/interface/cursor-theme', '/org/gnome/desktop/interface/gtk-theme']
saved-pathbar-path='/org/gnome/desktop/interface/cursor-theme'
saved-view='/org/'
show-warning=false
use-shortpaths=true
window-height=1033
window-is-maximized=true
window-width=1920

[org/gnome/desktop/interface]
color-scheme='prefer-dark'
cursor-size=24
cursor-theme='catppuccin-mocha-red-cursors'
font-antialiasing='grayscale'
font-hinting='slight'
font-name='FiraCode Nerd Font Mono 12'
font-rgba-order='rgb'
gtk-theme='adw-gtk3-dark'
icon-theme='Papirus-Dark'
text-scaling-factor=1.0
toolbar-icons-size='large'
toolbar-style='both-horiz'

[org/gnome/desktop/sound]
event-sounds=true
input-feedback-sounds=false

[org/gtk/settings/file-chooser]
date-format='regular'
expand-folders=true
location-mode='path-bar'
show-hidden=false
show-size-column=true
show-type-column=true
sidebar-width=165
sort-column='name'
sort-directories-first=true
sort-order='ascending'
startup-mode='cwd'
type-format='category'
window-position=(0, 0)
window-size=(800, 553)
